# ============================================================
# Airflow Docker Compose — Taxi Data Engineering Project
# ============================================================
# Setup:
#   1. Copy .env.example to .env and fill in your Azure credentials
#   2. Run:  docker compose up airflow-init   (first time only)
#   3. Run:  docker compose up -d
#   4. Open: http://localhost:8080  (admin / admin)
#
# To trigger Part 1 manually: Airflow UI → DAGs → part1_batch_taxi_pipeline → Trigger
# To test Part 2: drop a .csv file into part_2_real_time_processing/input_zone/
# ============================================================

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # Install pipeline dependencies inside the Airflow image at startup
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      pandas
      numpy
      pyarrow
      azure-storage-blob
      python-dotenv
      watchdog
      openpyxl
    # Make project files discoverable from the DAGs
    PROJECT_DIR: /opt/airflow
    PYTHONPATH: /opt/airflow/part_1_batch_processing:/opt/airflow/part_2_real_time_processing
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./part_1_batch_processing:/opt/airflow/part_1_batch_processing
    - ./part_2_real_time_processing:/opt/airflow/part_2_real_time_processing
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ── One-time DB init (run with: docker compose up airflow-init) ───────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Salina \
          --lastname Giri \
          --role Admin \
          --email zakarias1801@gmail.com
    environment:
      <<: *airflow-common-env
    restart: "no"

  # ── Scheduler (triggers tasks) ────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # ── Web UI (http://localhost:8080) ────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-db-volume:
