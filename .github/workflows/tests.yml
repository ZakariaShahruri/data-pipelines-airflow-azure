name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        part: [part_1_batch_processing, part_2_real_time_processing]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.part }}
        run: |
          pip install -r requirements.txt
          pip install -r ../requirements-dev.txt

      - name: Run tests
        working-directory: ${{ matrix.part }}
        run: pytest -v
